<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styleproducts.css">
    <title>iPhone Products</title>
</head>
<body>
    <div class="product-grid">
        <div class="product-card">
            <div class="image-container">
                <img src="images/ip11.jpg" alt="iPhone 11">
            </div>
            <div class="product-info">
                <h3>iPhone 11</h3>
                <p class="price">₱8,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="images/ip13.jpg" alt="iPhone 13">
            </div>
            <div class="product-info">
                <h3>iPhone 13</h3>
                <p class="price">₱11,499</p>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="images/iph14.jpg" alt="iPhone 14">
            </div>
            <div class="product-info">
                <h3>iPhone 14</h3>
                <p class="price">₱12,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <img src="images/ip15.jpg" alt="iPhone 15">
            </div>
            <div class="product-info">
                <span class="badge">Brand New</span>
                <h3>iPhone 15</h3>
                <p class="price">₱15,999</p>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>
